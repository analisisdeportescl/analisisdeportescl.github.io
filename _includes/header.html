<header class="site-header" role="banner">
  <div class="site-header-inner">
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="Inicio">
      <img src="{{ '/assets/img/logo-td.png' | relative_url }}" alt="Logo Transparencia Deporte" class="site-logo-img">
      Transparencia<span>Deporte</span>
    </a>

    <button class="menu-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="nav-links">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav id="nav-links" role="navigation" aria-label="Navegacion principal">
      <ul class="nav-links">
        {% for item in site.data.navegacion %}
          <li>
            <a href="{{ item.url | relative_url }}"
               {% if page.url == item.url %}aria-current="page"{% endif %}>
              {{ item.titulo }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
