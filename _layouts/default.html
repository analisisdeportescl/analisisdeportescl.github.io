<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  {% include seo.html %}

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, main, article, section, header, footer, nav, div, p, h1, h2, h3, h4, h5, h6,
    ul, ol, li, a, table, thead, tbody, tr, th, td, blockquote, pre, code, img, figure {
      all: revert;
      box-sizing: border-box;
    }

    :root {
      --azul-oscuro: #1a2332;
      --azul-medio: #2c3e57;
      --azul-claro: #3a5a7c;
      --blanco: #ffffff;
      --gris-fondo: #f4f5f7;
      --gris-texto: #4a4a4a;
      --gris-borde: #dde1e6;
      --rojo-negativo: #c0392b;
      --verde-positivo: #27864e;
      --amarillo-alerta: #d4a017;
      --fuente-cuerpo: 'Charter', 'Georgia', 'Times New Roman', serif;
      --fuente-titulo: 'system-ui', -apple-system, 'Segoe UI', sans-serif;
      --ancho-max: 740px;
    }

    html { background-color: var(--blanco) !important; }
    body {
      font-family: var(--fuente-cuerpo) !important;
      font-size: 18px !important;
      line-height: 1.7 !important;
      color: var(--gris-texto) !important;
      background-color: var(--blanco) !important;
      -webkit-font-smoothing: antialiased;
      margin: 0 !important;
      padding: 0 !important;
    }

    body > header.page-header,
    .main-content > header,
    body > footer.site-footer,
    .project-name, .project-tagline {
      display: none !important;
    }

    .sitio-header {
      background-color: var(--azul-oscuro) !important;
      padding: 0.8rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .sitio-header-inner {
      max-width: var(--ancho-max);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sitio-logo {
      color: var(--blanco) !important;
      text-decoration: none;
      font-family: var(--fuente-titulo);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
    }
    .sitio-logo span { color: #6eadd4 !important; }

    .nav-principal { display: flex; gap: 1.5rem; list-style: none; padding: 0; margin: 0; }
    .nav-principal a {
      color: rgba(255,255,255,0.75) !important;
      text-decoration: none;
      font-family: var(--fuente-titulo);
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .nav-principal a:hover,
    .nav-principal a[aria-current="page"] { color: var(--blanco) !important; }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
    }
    .menu-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--blanco);
      margin: 5px 0;
      transition: transform 0.3s, opacity 0.3s;
    }

    @media (max-width: 640px) {
      .menu-toggle { display: block; }
      .nav-principal {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--azul-oscuro);
        padding: 1rem 1.5rem;
        gap: 0.8rem;
        border-top: 1px solid var(--azul-medio);
      }
      .nav-principal.abierto { display: flex; }
      .nav-principal a { font-size: 0.95rem; }
    }

    .contenido-principal {
      max-width: var(--ancho-max) !important;
      margin: 0 auto !important;
      padding: 2rem 1.5rem 4rem !important;
      background-color: var(--blanco) !important;
      color: var(--gris-texto) !important;
    }

    .sitio-footer {
      background-color: var(--azul-oscuro) !important;
      color: rgba(255,255,255,0.6) !important;
      padding: 2rem 1.5rem;
      font-size: 0.85rem;
      font-family: var(--fuente-titulo);
    }
    .sitio-footer-inner {
      max-width: var(--ancho-max);
      margin: 0 auto;
    }
    .sitio-footer a {
      color: rgba(255,255,255,0.8) !important;
      text-decoration: none;
    }
    .sitio-footer a:hover { text-decoration: underline; }
  </style>

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  {% include header.html %}

  <main class="contenido-principal" role="main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
